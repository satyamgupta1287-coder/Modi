<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video API Test Environment</title>
    <!-- Tailwind CSS for instant styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; }
    </style>
</head>
<body class="p-8">
    <div class="max-w-5xl mx-auto">
        <h1 class="text-3xl font-bold mb-4 text-green-400">API Test Environment 🚀</h1>
        <p class="mb-8 text-gray-400">Testing Lovable Video Hosting API</p>
        
        <!-- Status Message -->
        <div id="status" class="mb-6 px-4 py-3 bg-gray-800 rounded border border-gray-700 text-yellow-400 font-mono text-sm">
            Fetching videos from API...
        </div>

        <!-- Video Grid -->
        <div id="video-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Videos inject hone ke baad yahan aayenge -->
        </div>
    </div>

    <script>
        async function fetchVideos() {
            const apiUrl = 'const apiUrl = 'https://stream-sweetly.lovable.app/api/public/videos';
';
            const apiKey = 'vh_live_c2N9BSdLT-427m6aLx70WyXEvFe24OJB';
            
            const statusEl = document.getElementById('status');
            const gridEl = document.getElementById('video-grid');

            try {
                const response = await fetch(apiUrl, {
                    method: 'GET',
                    headers: {
                        'X-API-Key': apiKey,
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) {
                    throw new Error(`HTTP Error! Status: ${response.status}`);
                }

                const data = await response.json();
                console.log("Full API Response:", data); // Check console for structure

                // Check if API returns an array directly or inside a property like data.videos
                const videos = Array.isArray(data) ? data : (data.videos || []);

                if (videos.length === 0) {
                    statusEl.innerHTML = '<span class="text-blue-400">API Connected! But no videos found. Upload a video to the hosting platform first.</span>';
                    return;
                }

                statusEl.innerHTML = `<span class="text-green-400">Success! Loaded ${videos.length} video(s) successfully.</span>`;

                // Render videos dynamically
                videos.forEach((vid, index) => {
                    // Adjust these variables based on what key names the API actually returns
                    const videoUrl = vid.video_url || vid.url || vid.src || '';
                    const title = vid.title || `Test Video ${index + 1}`;

                    if(videoUrl) {
                        const card = document.createElement('div');
                        card.className = 'bg-gray-800 p-4 rounded-xl shadow-lg border border-gray-700 flex flex-col';
                        
                        card.innerHTML = `
                            <h2 class="text-lg mb-3 font-semibold text-gray-200 truncate">${title}</h2>
                            <video controls class="w-full rounded bg-black flex-grow" preload="metadata">
                                <source src="${videoUrl}" type="video/mp4">
                                Your browser does not support the video tag.
                            </video>
                        `;
                        gridEl.appendChild(card);
                    }
                });

            } catch (error) {
                console.error("Fetch error:", error);
                statusEl.innerHTML = `<span class="text-red-500">Error fetching data: ${error.message}</span>`;
            }
        }

        // Run function on load
        fetchVideos();
    </script>
</body>
</html>
