<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(circle at 30% 20%, #1a1f3d, #0b0c17 70%);
    font-family: 'Segoe UI', system-ui, sans-serif;
  }
  .calc {
    width: 320px;
    max-width: 92vw;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    backdrop-filter: blur(16px);
    border-radius: 24px;
    padding: 20px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
  }
  .display {
    text-align: right;
    color: #fff;
    padding: 20px 10px;
    min-height: 90px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
  }
  .display .prev {
    font-size: 14px;
    color: rgba(255,255,255,0.45);
    min-height: 18px;
    word-break: break-all;
  }
  .display .curr {
    font-size: 38px;
    font-weight: 600;
    word-break: break-all;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-top: 10px;
  }
  button {
    border: none;
    border-radius: 14px;
    padding: 18px 0;
    font-size: 18px;
    font-weight: 500;
    cursor: pointer;
    background: rgba(255,255,255,0.08);
    color: #fff;
    transition: transform 0.08s ease, background 0.2s;
  }
  button:active { transform: scale(0.94); }
  .op {
    background: rgba(123, 97, 255, 0.35);
    color: #d7c9ff;
  }
  .equal {
    background: linear-gradient(135deg, #7b61ff, #4f8cff);
    grid-column: span 2;
    color: #fff;
  }
  .clear, .del {
    background: rgba(255, 99, 99, 0.2);
    color: #ffb3b3;
  }
  .zero { grid-column: span 2; }
</style>
</head>
<body>

<div class="calc">
  <div class="display">
    <div class="prev" id="prevOperand"></div>
    <div class="curr" id="currOperand">0</div>
  </div>
  <div class="grid">
    <button class="clear" onclick="clearAll()">AC</button>
    <button class="del" onclick="deleteLast()">DEL</button>
    <button class="op" onclick="chooseOperator('%')">%</button>
    <button class="op" onclick="chooseOperator('÷')">÷</button>

    <button onclick="appendNumber('7')">7</button>
    <button onclick="appendNumber('8')">8</button>
    <button onclick="appendNumber('9')">9</button>
    <button class="op" onclick="chooseOperator('×')">×</button>

    <button onclick="appendNumber('4')">4</button>
    <button onclick="appendNumber('5')">5</button>
    <button onclick="appendNumber('6')">6</button>
    <button class="op" onclick="chooseOperator('-')">-</button>

    <button onclick="appendNumber('1')">1</button>
    <button onclick="appendNumber('2')">2</button>
    <button onclick="appendNumber('3')">3</button>
    <button class="op" onclick="chooseOperator('+')">+</button>

    <button class="zero" onclick="appendNumber('0')">0</button>
    <button onclick="appendNumber('.')">.</button>
    <button class="equal" onclick="calculate()">=</button>
  </div>
</div>

<script>
  let currOperand = '0';
  let prevOperand = '';
  let operator = null;

  const currEl = document.getElementById('currOperand');
  const prevEl = document.getElementById('prevOperand');

  function updateDisplay() {
    currEl.textContent = currOperand;
    prevEl.textContent = prevOperand ? `${prevOperand} ${operator}` : '';
  }

  function appendNumber(num) {
    if (num === '.' && currOperand.includes('.')) return;
    if (currOperand === '0' && num !== '.') currOperand = num;
    else currOperand += num;
    updateDisplay();
  }

  function chooseOperator(op) {
    if (currOperand === '') return;
    if (prevOperand !== '') calculate();
    operator = op;
    prevOperand = currOperand;
    currOperand = '';
    updateDisplay();
  }

  function calculate() {
    let result;
    const prev = parseFloat(prevOperand);
    const curr = parseFloat(currOperand);
    if (isNaN(prev) || isNaN(curr)) return;

    switch (operator) {
      case '+': result = prev + curr; break;
      case '-': result = prev - curr; break;
      case '×': result = prev * curr; break;
      case '÷': result = curr === 0 ? 'Error' : prev / curr; break;
      case '%': result = prev % curr; break;
      default: return;
    }

    currOperand = result.toString();
    operator = null;
    prevOperand = '';
    updateDisplay();
  }

  function clearAll() {
    currOperand = '0';
    prevOperand = '';
    operator = null;
    updateDisplay();
  }

  function deleteLast() {
    currOperand = currOperand.toString().slice(0, -1);
    if (currOperand === '') currOperand = '0';
    updateDisplay();
  }
</script>

</body>
</html>
