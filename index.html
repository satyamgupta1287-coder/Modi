<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flappy Modi</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    user-select:none;
}

body{
    overflow:hidden;
    background:#000;
    font-family:Arial, sans-serif;
}

#game{
    position:relative;
    width:100vw;
    height:100vh;
    background:url("bg.png") center/cover no-repeat;
}

/* SOCIAL LINKS */
#social-links{
    position:absolute;
    bottom:140px;
    right:20px;
    display:flex;
    flex-direction:column;
    gap:10px;
    z-index:50;
}

#social-links a{
    text-decoration:none;
    padding:10px 18px;
    border-radius:30px;
    font-weight:bold;
    color:#fff;
    font-size:14px;
    text-align:center;
    box-shadow:0 4px 8px rgba(0,0,0,.5);
}

#social-links .insta{
    background:linear-gradient(45deg,#f58529,#dd2a7b,#8134af);
}

#social-links .yt{
    background:#ff0000;
}

#ground{
    position:absolute;
    bottom:0;
    width:100%;
    height:110px;
    background:url("ground.png") repeat-x;
    z-index:5;
}

#bird{
    position:absolute;
    width:60px;
    height:45px;
    background:url("modi.jpg") center/cover no-repeat;
    z-index:10;
}

.pipe{
    position:absolute;
    width:80px;
    background:url("rahul.jpg") center/cover no-repeat;
    z-index:3;
}

#score{
    position:absolute;
    top:25px;
    left:50%;
    transform:translateX(-50%);
    font-size:60px;
    font-weight:bold;
    color:#fff;
    text-shadow:3px 3px 0 #000;
    z-index:20;
}

.screen{
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.55);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    color:white;
    z-index:30;
    text-align:center;
}

.hidden{display:none;}

button{
    margin-top:15px;
    padding:12px 25px;
    font-size:22px;
    background:#f1c40f;
    border:none;
    border-radius:10px;
    cursor:pointer;
    box-shadow:0 5px 0 #d35400;
}

button:active{
    transform:translateY(5px);
    box-shadow:none;
}
</style>
</head>

<body>

<div id="game">

    <!-- SOCIAL BUTTONS -->
    <div id="social-links">
        <a class="insta" href="https://www.instagram.com/with.pawann/" target="_blank">Instagram</a>
        <a class="yt" href="https://www.youtube.com/@Toxicexploit" target="_blank">YouTube</a>
    </div>

    <div id="score">0</div>
    <div id="bird"></div>
    <div id="ground"></div>

    <div id="start-screen" class="screen">
        <h1>Flappy Modi</h1>
        <p>Tap / Click / Space to Play</p>
        <button onclick="startGame()">Start</button>
    </div>

    <div id="gameover-screen" class="screen hidden">
        <img src="end.jpg" width="180">
        <h2 id="final-score"></h2>
        <button onclick="startGame()">Restart</button>
    </div>
</div>

<script>
const game=document.getElementById("game");
const bird=document.getElementById("bird");
const scoreText=document.getElementById("score");
const startScreen=document.getElementById("start-screen");
const gameOver=document.getElementById("gameover-screen");
const finalScore=document.getElementById("final-score");

const bgMusic=new Audio("bg.mp3");
const failSound=new Audio("end.mp3");
bgMusic.loop=true;

let pipes=[],score=0,velocity=0,birdY=0;
let gravity=0.45,jumpPower=-8;
let pipeGap=180,pipeSpeed=2.7,lastPipe=0;
let gameRunning=false;

function startGame(){
    pipes.forEach(p=>p.remove());
    pipes=[];
    score=0;
    scoreText.innerText=0;
    velocity=0;
    birdY=game.clientHeight/2;
    bird.style.left="25%";
    bird.style.top=birdY+"px";
    gameRunning=true;
    startScreen.classList.add("hidden");
    gameOver.classList.add("hidden");
    bgMusic.currentTime=0;
    bgMusic.play();
    requestAnimationFrame(update);
}

function endGame(){
    gameRunning=false;
    bgMusic.pause();
    failSound.play();
    finalScore.innerText="Score: "+score;
    gameOver.classList.remove("hidden");
}

function spawnPipe(){
    const top=document.createElement("div");
    const bottom=document.createElement("div");
    top.className=bottom.className="pipe";
    let topH=Math.random()*250+50;
    let bottomH=game.clientHeight-topH-pipeGap-110;
    top.style.height=topH+"px";
    bottom.style.height=bottomH+"px";
    top.style.top=0;
    bottom.style.bottom="110px";
    top.style.left=bottom.style.left="100%";
    game.append(top,bottom);
    pipes.push(top,bottom);
}

function update(time){
    if(!gameRunning)return;
    velocity+=gravity;
    birdY+=velocity;
    bird.style.top=birdY+"px";

    if(time-lastPipe>1500){
        spawnPipe();
        lastPipe=time;
    }

    pipes.forEach((p,i)=>{
        p.style.left=(parseFloat(p.style.left)-pipeSpeed)+"px";
        if(parseFloat(p.style.left)<-100){
            p.remove();
            pipes.splice(i,1);
        }
        if(!p.scored && p.getBoundingClientRect().right<bird.getBoundingClientRect().left){
            p.scored=true;
            if(i%2===0){
                score++;
                scoreText.innerText=score;
            }
        }
        if(collision(p)) endGame();
    });

    if(birdY+45>=game.clientHeight-110) endGame();
    requestAnimationFrame(update);
}

function collision(pipe){
    const b=bird.getBoundingClientRect();
    const p=pipe.getBoundingClientRect();
    return b.left<p.right && b.right>p.left && b.top<p.bottom && b.bottom>p.top;
}

function jump(){
    if(gameRunning) velocity=jumpPower;
}

window.addEventListener("keydown",e=>{
    if(e.code==="Space"||e.code==="ArrowUp") jump();
});
window.addEventListener("mousedown",jump);
window.addEventListener("touchstart",e=>{e.preventDefault();jump();});
</script>

</body>
</html>
